syntax = "proto3";

package backplane.v1;
option csharp_namespace = "SpaceSpreadsheetEmulator.Backplane.Contracts.V1";

// Provides Worker-owned login and character-selection operations to Gateways.
service LoginGameplay {
  rpc GetCompatibility (CompatibilityRequest) returns (CompatibilityResponse);
  rpc Authenticate (AuthenticateRequest) returns (AuthenticateResponse);
  rpc GetCharacterSelection (CharacterSelectionRequest) returns (CharacterSelectionResponse);
  rpc GetStationCatalog (StationCatalogRequest) returns (StationCatalogResponse);
  rpc GetNpcAgentCatalog (NpcAgentCatalogRequest) returns (NpcAgentCatalogResponse);
  rpc CloseSession (CloseSessionRequest) returns (CloseSessionResponse);
}

// Identifies the Gateway request, client session, correlation, and compatibility build.
message RequestContext {
  string gateway_id = 1;
  uint64 gateway_session_id = 2;
  string correlation_id = 3;
  uint32 client_build = 4;
}

// Requests the compatibility manifest exposed by the login Worker.
message CompatibilityRequest {}

// Pins the Worker's client, protocol, and static-data compatibility artifacts.
message CompatibilityResponse {
  uint32 client_build = 1;
  uint32 protocol_profile = 2;
  uint32 sde_build = 3;
  string source_sha256 = 4;
  string artifact_sha256 = 5;
}

// Carries a Gateway-scoped client authentication attempt.
message AuthenticateRequest {
  RequestContext context = 1;
  string user_name = 2;
  bytes credential_proof = 3;
  string language_id = 4;
  string country_code = 5;
}

// Returns an opaque login ticket and neutral account identity after authentication.
message AuthenticateResponse {
  bool success = 1;
  ServiceError error = 2;
  bytes login_ticket = 3;
  int64 account_id = 4;
  string user_name = 5;
  string language_id = 6;
  string country_code = 7;
  int64 role = 8;
}

// Requests the characters available to a validated login session.
message CharacterSelectionRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
}

// Contains the account and characters available at character selection.
message CharacterSelectionResponse {
  ServiceError error = 1;
  int64 account_id = 2;
  repeated CharacterSummary characters = 3;
}

// Describes the character, location, ship, and account-facing selection values.
message CharacterSummary {
  int64 character_id = 1;
  string name = 2;
  int32 race_id = 3;
  int32 bloodline_id = 4;
  int32 ancestry_id = 5;
  int32 character_type_id = 6;
  int32 corporation_id = 7;
  string corporation_name = 8;
  optional int32 station_id = 9;
  string station_name = 10;
  int32 solar_system_id = 11;
  string solar_system_name = 12;
  int32 constellation_id = 13;
  int32 region_id = 14;
  int32 ship_type_id = 15;
  string ship_name = 16;
  string balance = 17;
  int64 skill_points = 18;
  int64 last_login_unix_milliseconds = 19;
  int64 ship_id = 20;
  int32 headquarters_station_id = 21;
  int32 station_owner_id = 22;
  int32 station_operation_id = 23;
  int32 station_type_id = 24;
  int32 ship_group_id = 25;
  int32 ship_category_id = 26;
  int32 station_group_id = 27;
  int32 station_category_id = 28;
  int32 character_group_id = 29;
  int32 character_category_id = 30;
  repeated CharacterInventoryItem inventory_items = 31;
}

// Describes one durable character-owned inventory stack.
message CharacterInventoryItem {
  int64 item_id = 1;
  int32 type_id = 2;
  int64 owner_id = 3;
  int64 location_id = 4;
  CharacterInventoryLocationKind location_kind = 5;
  CharacterInventoryItemFlag flag = 6;
  int64 quantity = 7;
  bool singleton = 8;
  string custom_name = 9;
  int32 group_id = 10;
  int32 category_id = 11;
}

enum CharacterInventoryLocationKind {
  CHARACTER_INVENTORY_LOCATION_KIND_UNSPECIFIED = 0;
  CHARACTER_INVENTORY_LOCATION_KIND_STATION = 1;
  CHARACTER_INVENTORY_LOCATION_KIND_ITEM = 2;
}

enum CharacterInventoryItemFlag {
  CHARACTER_INVENTORY_ITEM_FLAG_UNSPECIFIED = 0;
  CHARACTER_INVENTORY_ITEM_FLAG_STATION_HANGAR = 1;
  CHARACTER_INVENTORY_ITEM_FLAG_SHIP_CARGO = 2;
}

// Requests the build-pinned NPC station catalog for a validated login session.
message StationCatalogRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
}

// Contains protocol-neutral station rows sourced from the pinned static-data artifact.
message StationCatalogResponse {
  ServiceError error = 1;
  repeated StationSummary stations = 2;
}

message StationSummary {
  int32 station_id = 1;
  int32 solar_system_id = 2;
  int32 operation_id = 3;
  int32 station_type_id = 4;
  int32 owner_id = 5;
}

// Requests the build-pinned NPC-agent catalog for a validated login session.
message NpcAgentCatalogRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
}

message NpcAgentCatalogResponse {
  ServiceError error = 1;
  repeated NpcAgentSummary agents = 2;
}

message NpcAgentSummary {
  int64 agent_id = 1;
  int32 agent_type_id = 2;
  int32 division_id = 3;
  int32 level = 4;
  optional int64 station_id = 5;
  optional int32 bloodline_id = 6;
  optional int64 corporation_id = 7;
  bool gender = 8;
  bool is_locator_agent = 9;
}

// Requests invalidation of a Gateway-scoped login session.
message CloseSessionRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
}

// Reports whether a login session was found and closed.
message CloseSessionResponse {
  bool closed = 1;
}

// Carries a stable error code and a human-readable service failure description.
message ServiceError {
  string code = 1;
  string message = 2;
}
