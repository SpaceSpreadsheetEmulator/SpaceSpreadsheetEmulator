syntax = "proto3";

package backplane.v1;
option csharp_namespace = "SpaceSpreadsheetEmulator.Backplane.Contracts.V1";

import "Protos/login_gameplay.proto";

service SolarSystemGameplay {
  rpc Undock (SolarSystemMutationRequest) returns (SolarSystemMutationResponse);
  rpc Dock (SolarSystemMutationRequest) returns (SolarSystemMutationResponse);
  rpc SetVelocity (SolarSystemVelocityRequest) returns (SolarShipStateResponse);
  rpc GetShipState (SolarShipStateRequest) returns (SolarShipStateResponse);
}

message SolarSystemMutationRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
  string owner_node_id = 3;
  uint64 expected_epoch = 4;
  int32 solar_system_id = 5;
  int64 character_id = 6;
  int64 ship_id = 7;
  int32 station_id = 8;
}

message SolarSystemMutationResponse {
  ServiceError error = 1;
  string owner_node_id = 2;
  uint64 epoch = 3;
  int32 solar_system_id = 4;
  int64 character_id = 5;
  int64 ship_id = 6;
  optional int32 station_id = 7;
  SolarShipState ship_state = 8;
}

message SolarSystemVelocityRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
  string owner_node_id = 3;
  uint64 expected_epoch = 4;
  int32 solar_system_id = 5;
  int64 character_id = 6;
  int64 ship_id = 7;
  SolarVector3 velocity = 8;
}

message SolarShipStateRequest {
  RequestContext context = 1;
  bytes login_ticket = 2;
  string owner_node_id = 3;
  uint64 expected_epoch = 4;
  int32 solar_system_id = 5;
  int64 character_id = 6;
  int64 ship_id = 7;
}

message SolarShipStateResponse {
  ServiceError error = 1;
  SolarShipState ship_state = 2;
}

message SolarShipState {
  int64 character_id = 1;
  int64 ship_id = 2;
  int32 solar_system_id = 3;
  uint64 epoch = 4;
  uint64 tick = 5;
  SolarVector3 position = 6;
  SolarVector3 velocity = 7;
}

message SolarVector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}
