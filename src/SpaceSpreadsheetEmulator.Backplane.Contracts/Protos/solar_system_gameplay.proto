syntax = "proto3";

package backplane.v2;
option csharp_namespace = "SpaceSpreadsheetEmulator.Backplane.Contracts.V2";

// Accepts player intent and streams authoritative solar-system output to Gateways.
service SolarSystemGameplay {
  rpc RequestUndock (SolarSystemTransitionIntent) returns (SolarSystemCommandResult);
  rpc RequestDock (SolarSystemTransitionIntent) returns (SolarSystemCommandResult);
  rpc SetMovementIntent (MovementIntentRequest) returns (SolarSystemCommandResult);
  rpc SubscribeSession (SessionSubscriptionRequest) returns (stream SessionEventEnvelope);
}

// Identifies one Gateway request without carrying any client wire representation.
message GameplayRequestContext {
  string gateway_id = 1;
  uint64 gateway_session_id = 2;
  string correlation_id = 3;
  uint32 client_build = 4;
}

// Carries a dock or undock intent to the currently routed system owner.
message SolarSystemTransitionIntent {
  GameplayRequestContext context = 1;
  bytes login_ticket = 2;
  string owner_node_id = 3;
  uint64 expected_epoch = 4;
  int32 solar_system_id = 5;
  int64 character_id = 6;
  int64 ship_id = 7;
  int32 station_id = 8;
  string idempotency_key = 9;
}

// Carries a requested heading and speed. Worker decides the applied velocity.
message MovementIntentRequest {
  GameplayRequestContext context = 1;
  bytes login_ticket = 2;
  string owner_node_id = 3;
  uint64 expected_epoch = 4;
  int32 solar_system_id = 5;
  int64 character_id = 6;
  int64 ship_id = 7;
  SolarVector3 direction = 8;
  double requested_speed = 9;
  MovementIntentKind kind = 10;
  int64 target_entity_id = 11;
  double desired_range = 12;
  SolarVector3 target_position = 13;
}

// Selects one protocol-neutral player movement intent.
enum MovementIntentKind {
  // Moves along a normalized direction at the requested speed.
  MOVEMENT_INTENT_DIRECTION = 0;
  // Cancels the active movement controller and stops the ship.
  MOVEMENT_INTENT_STOP = 1;
  // Approaches or keeps range from an authoritative in-system entity.
  MOVEMENT_INTENT_FOLLOW = 2;
  // Moves tangentially while correcting toward a range from an entity.
  MOVEMENT_INTENT_ORBIT = 3;
  // Moves to an absolute in-system point without overshooting it.
  MOVEMENT_INTENT_GO_TO_POINT = 4;
}

// Reports whether Worker accepted an intent and the authoritative resulting state.
message SolarSystemCommandResult {
  GameplayError error = 1;
  string owner_node_id = 2;
  uint64 epoch = 3;
  int32 solar_system_id = 4;
  int64 character_id = 5;
  int64 ship_id = 6;
  optional int32 station_id = 7;
  SolarShipState ship_state = 8;
}

// Opens a bounded, cancellable stream for one authenticated player session.
message SessionSubscriptionRequest {
  GameplayRequestContext context = 1;
  bytes login_ticket = 2;
  string owner_node_id = 3;
  uint64 expected_epoch = 4;
  int32 solar_system_id = 5;
  int64 character_id = 6;
  int64 ship_id = 7;
}

// Carries one ordered, fenced snapshot or simulation delta.
message SessionEventEnvelope {
  string gateway_id = 1;
  uint64 gateway_session_id = 2;
  string owner_node_id = 3;
  int32 solar_system_id = 4;
  uint64 epoch = 5;
  uint64 sequence = 6;

  oneof payload {
    SessionSnapshot snapshot = 10;
    SolarShipState entity_entered = 11;
    SolarShipState entity_moved = 12;
    SolarShipState ship_state_changed = 13;
    EntityIdentity entity_left = 14;
  }
}

// Establishes the authoritative starting view for subsequent deltas.
message SessionSnapshot {
  // Dynamic ships present when the subscription begins.
  repeated SolarShipState entities = 1;
  // Immutable authored objects present in the owned solar system.
  repeated SolarSystemObjectState static_objects = 2;
}

// Identifies an immutable, targetable object in one solar system.
message SolarSystemObjectState {
  int64 entity_id = 1;
  int32 type_id = 2;
  string name = 3;
  SolarSystemObjectKind kind = 4;
  int32 solar_system_id = 5;
  SolarVector3 position = 6;
  double radius = 7;
  optional int32 destination_solar_system_id = 8;
  int32 owner_id = 9;
}

enum SolarSystemObjectKind {
  SOLAR_SYSTEM_OBJECT_KIND_UNSPECIFIED = 0;
  SOLAR_SYSTEM_OBJECT_KIND_STATION = 1;
  SOLAR_SYSTEM_OBJECT_KIND_PLANET = 2;
  SOLAR_SYSTEM_OBJECT_KIND_JUMP_GATE = 3;
}

// Identifies an entity which is no longer visible in the subscribed system.
message EntityIdentity {
  int64 character_id = 1;
  int64 ship_id = 2;
}

// Captures authoritative position and velocity at one simulation tick.
message SolarShipState {
  int64 character_id = 1;
  int64 ship_id = 2;
  int32 solar_system_id = 3;
  uint64 epoch = 4;
  uint64 tick = 5;
  SolarVector3 position = 6;
  SolarVector3 velocity = 7;
  string character_name = 8;
}

message SolarVector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message GameplayError {
  string code = 1;
  string message = 2;
}
