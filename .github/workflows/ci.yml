name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet tool restore
      - run: dotnet restore SpaceSpreadsheetEmulator.slnx
      - run: dotnet format SpaceSpreadsheetEmulator.slnx --verify-no-changes --no-restore
      - run: dotnet build SpaceSpreadsheetEmulator.slnx --configuration Release --no-restore
      - run: >-
          dotnet ef migrations has-pending-model-changes
          --project src/SpaceSpreadsheetEmulator.Persistence
          --startup-project src/SpaceSpreadsheetEmulator.Persistence
          --configuration Release
          --no-build
      - run: >-
          dotnet test SpaceSpreadsheetEmulator.slnx
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --settings coverage.runsettings
          --results-directory artifacts/test-results
          --logger trx
      - run: >-
          dotnet reportgenerator
          -reports:"artifacts/test-results/**/coverage.cobertura.xml"
          -targetdir:"artifacts/coverage"
          -reporttypes:"Cobertura;HtmlSummary;TextSummary"
          -filefilters:"+*/src/*;-*/Migrations/*;-*/*.Designer.cs;-*/obj/*"
      - run: eng/verify-coverage.sh artifacts/coverage/Cobertura.xml 0.80 0.65
      - run: dotnet run --project tools/SpaceSpreadsheetEmulator.Protocol.Tool --configuration Release --no-build -- fixtures verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-and-coverage
          path: |
            artifacts/test-results
            artifacts/coverage
