services:
  postgres:
    image: postgres:18.4-trixie
    environment:
      POSTGRES_DB: ${SSE_POSTGRES_DATABASE:-space_spreadsheet_emulator}
      POSTGRES_USER: ${SSE_POSTGRES_USER:-sse}
      POSTGRES_PASSWORD: ${SSE_POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "127.0.0.1:${SSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

volumes:
  postgres-data:
